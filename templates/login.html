<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1f7a3d">
    <title>Login/Signup</title>
  <link rel="manifest" href="{{ url_for('web_manifest') }}">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='img/logo.png') }}">
    <link rel="stylesheet" href="../static/css/login.css?v=2">
    <link rel="icon" href="{{ url_for('static', filename='img/loader.png') }}" type="image/x-icon">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- <script src="{{ url_for('static', filename='js/privacy_policy.js') }}?v=2"></script> -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/chatbot.css') }}">
</head>
<body>
    {% include 'flash_messages.html' %}
    
    <div class="login-page">  

        <div class="form">
            <div class="flex justify-center mb-6">
                <a href="{{ url_for('home') }}">
                  <img src="{{ url_for('static', filename='img/logo.png') }}" alt="EzaSmart Logo" class="h-5" style="cursor:pointer;">
                </a>
            </div>
            <section id="register-form">
                <form class="register-form" action="{{ url_for('login') }}" method="POST">
                    <input type="hidden" name="form_type" value="register"/>
                    <input type="text" name="username" placeholder="username (display name)" required/>
                    <input type="email" name="email" placeholder="email address" required/>
                    <input type="password" name="password" placeholder="password" required/>

                    <select name="gender" required>
                        <option value="" disabled selected>Select Gender</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>

                      <div class="privacy-policy-row">
                        <input type="checkbox" id="privacy_policy" name="privacy_policy" required class="privacy-policy-checkbox" /> 
                        <label for="privacy_policy" class="privacy-policy-label">
                          I hereby confirm that I have read and agree with the
                          <a href="https://docs.google.com/document/d/1Msbvb8TlV-20hu07iBT3J-ytbh48qHp5ML1MnAPrllw/edit?usp=sharing" target="_blank" style="text-decoration: underline; color: #1976d2;">Privacy Policy</a>.
                        </label>
                      </div>

                    <button type="submit">create</button>
                    <p class="message">Already registered? <a href="#login-form">Sign In</a></p>
                </form>
            </section>
            <section id="login-form">
                <form class="login-form" action="{{ url_for('login') }}" method="POST">
                    <input type="hidden" name="form_type" value="login"/>
                    <input type="hidden" name="next" value="{{ next_url }}"/>
                    <input type="email" name="email" placeholder="email" required/>
                    <input type="password" name="password" placeholder="password" required/>
                    <button type="submit">login</button>
                    <p class="message">Not registered? <a href="#register-form">Create an account</a></p>
                    <p class="message"><a href="{{ url_for('forgot_password') }}">Forgot Password?</a></p>
                </form>
            </section>
        </div>
    </div>
<script>
    $('.message a').click(function(){
    $('form').animate({height: "toggle", opacity: "toggle"}, "slow");
 });
</script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const checkbox = document.getElementById('privacy_policy');

    if (!checkbox) {
        console.log('Checkbox NOT found');
        return;
    }

    console.log('Checkbox found');

    // Set initial color
    // updateCheckboxColor();

    checkbox.addEventListener('change', function() {
        console.log('Checkbox changed. Checked:', checkbox.checked);
        // updateCheckboxColor();
    });

    // function updateCheckboxColor() {
    //     checkbox.style.accentColor = checkbox.checked ? '#28a745' : '#1976d2';
    // }
});
</script>
  <div id="chatbot-widget" class="chatbot-widget">
    <button class="chatbot-toggle" aria-label="Open chat" title="Chat with EzaSmart AI Assistant">
      <img src="{{ url_for('static', filename='img/logo.png') }}" alt="EzaSmart">
    </button>
    <div class="chatbot-panel">
      <div class="chatbot-header">
        <span>EzaSmart Assistant</span>
        <button class="chatbot-close" aria-label="Close">×</button>
      </div>
      <div class="chatbot-messages"></div>
      <div class="chatbot-input-area">
        <textarea class="chatbot-input" placeholder="Ask about hydroponics..." rows="1"></textarea>
        <button class="chatbot-send">Send</button>
      </div>
    </div>
  </div>
  <script src="{{ url_for('static', filename='js/chatbot.js') }}"></script>
  <script src="{{ url_for('static', filename='js/pwa.js') }}"></script>
</body>
</html>
